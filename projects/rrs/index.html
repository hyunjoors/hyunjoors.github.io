    const { useState, useMemo, useCallback, useEffect, useRef } = React;


/* ─────────────── UTILITIES ─────────────── */
function gcd(a, b) { while (b) { [a, b] = [b, a % b]; } return a; }

function euclideanSteps(a, b) {
  const steps = [];
  while (b !== 0) {
    const q = Math.floor(a / b);
    const r = a % b;
    steps.push({ a, b, q, r });
    a = b; b = r;
  }
  return steps;
}

function sqrtCF(r, maxTerms = 20) {
  const a0 = Math.floor(Math.sqrt(r));
  if (a0 * a0 === r) return { terms: [a0], period: [], convergents: [{ p: a0, q: 1 }], perfect: true };
  const terms = [a0];
  const states = [];
  let m = a0, d = r - a0 * a0;
  const convergents = [{ p: a0, q: 1 }];
  let p_prev = 1, p_curr = a0, q_prev = 0, q_curr = 1;
  for (let i = 0; i < maxTerms; i++) {
    const an = Math.floor((a0 + m) / d);
    terms.push(an);
    const mNext = an * d - m;
    const dNext = (r - mNext * mNext) / d;
    states.push({ m, d, an, mNext, dNext });
    const p_new = an * p_curr + p_prev;
    const q_new = an * q_curr + q_prev;
    convergents.push({ p: p_new, q: q_new });
    p_prev = p_curr; p_curr = p_new;
    q_prev = q_curr; q_curr = q_new;
    m = mNext; d = dNext;
    if (an === 2 * a0) break;
  }
  return { terms, period: terms.slice(1), convergents, states, a0, perfect: false };
}

function buildSquares(a, b, steps) {
  const squares = [];
  let x = 0, y = 0, horizontal = true, w = a, h = b, colorIdx = 0;
  for (const step of steps) {
    for (let i = 0; i < step.q; i++) {
      const side = horizontal ? h : w;
      squares.push({ x, y, size: side, colorIdx: colorIdx % 8, group: colorIdx, stepIdx: squares.length });
      if (horizontal) x += side; else y += side;
    }
    if (horizontal) w -= step.q * h; else h -= step.q * w;
    horizontal = !horizontal; colorIdx++;
  }
  return squares;
}

/* ─────────────── THEME ─────────────── */
const COLORS = {
  bg: "#FFF8F0",
  card: "#FFFFFF",
  primary: "#FF6B35",
  secondary: "#4ECDC4",
  accent: "#FFE66D",
  purple: "#A06CD5",
  pink: "#FF6B9D",
  blue: "#45B7D1",
  green: "#96CEB4",
  text: "#2D3436",
  textLight: "#636E72",
  border: "#E8E0D8",
  tabBg: "#FFF0E5",
};

const SQUARE_COLORS = ["#FF6B35", "#4ECDC4", "#FFE66D", "#A06CD5", "#FF6B9D", "#45B7D1", "#96CEB4", "#F7DC6F"];

const TAB_ICONS = ["🔢", "🗺️", "🔍", "🎨"];
const TAB_NAMES = ["RSS Machine", "Number Map", "√ Explorer", "Rectangle Art"];

/* ─────────────── TAB 1: RSS MACHINE ─────────────── */
function TabRSS() {
  const [a, setA] = useState(55);
  const [b, setB] = useState(34);
  const [inputA, setInputA] = useState("55");
  const [inputB, setInputB] = useState("34");
  const [currentStep, setCurrentStep] = useState(-1);
  const [autoPlay, setAutoPlay] = useState(false);
  const timerRef = useRef(null);

  const steps = useMemo(() => euclideanSteps(a, b), [a, b]);
  const totalSquares = useMemo(() => steps.reduce((s, st) => s + st.q, 0), [steps]);

  const apply = useCallback(() => {
    const na = parseInt(inputA), nb = parseInt(inputB);
    if (na > 1 && nb > 0 && na > nb && na <= 500) {
      setA(na); setB(nb); setCurrentStep(-1); setAutoPlay(false);
    }
  }, [inputA, inputB]);

  useEffect(() => {
    if (autoPlay && currentStep < steps.length - 1) {
      timerRef.current = setTimeout(() => setCurrentStep(s => s + 1), 900);
      return () => clearTimeout(timerRef.current);
    }
    if (currentStep >= steps.length - 1) setAutoPlay(false);
  }, [autoPlay, currentStep, steps.length]);

  const visibleSteps = currentStep === -1 ? steps : steps.slice(0, currentStep + 1);
  const presets = [
    { a: 55, b: 34, label: "55 & 34" }, { a: 17, b: 12, label: "17 & 12" },
    { a: 30, b: 11, label: "30 & 11" }, { a: 76, b: 47, label: "76 & 47" },
    { a: 97, b: 60, label: "97 & 60" },
  ];

  return (
    <div>
      <div style={styles.sectionIntro}>
        <h2 style={styles.sectionTitle}>🔢 The RSS Machine</h2>
        <p style={styles.sectionDesc}>
          <b>Repeated Reciprocal Subtraction</b> (also called the Euclidean Algorithm) breaks down two numbers
          by dividing over and over until nothing's left. Try it out!
        </p>
      </div>

      <div style={styles.controlRow}>
        <div style={styles.presetRow}>
          {presets.map(p => (
            <button key={p.label} onClick={() => { setA(p.a); setB(p.b); setInputA(String(p.a)); setInputB(String(p.b)); setCurrentStep(-1); setAutoPlay(false); }}
              style={{ ...styles.presetBtn, ...(a === p.a && b === p.b ? styles.presetActive : {}) }}>
              {p.label}
            </button>
          ))}
        </div>
        <div style={styles.inputGroup}>
          <span style={styles.inputLabel}>Custom:</span>
          <input style={styles.numInput} value={inputA} onChange={e => setInputA(e.target.value)} onKeyDown={e => e.key === "Enter" && apply()} />
          <span style={{ color: COLORS.textLight, fontWeight: 700 }}>÷</span>
          <input style={styles.numInput} value={inputB} onChange={e => setInputB(e.target.value)} onKeyDown={e => e.key === "Enter" && apply()} />
          <button style={styles.goBtn} onClick={apply}>Go!</button>
        </div>
      </div>

      <div style={styles.playControls}>
        <button style={styles.playBtn} onClick={() => { setCurrentStep(-1); }}>Show All</button>
        <button style={styles.playBtn} onClick={() => { setCurrentStep(0); setAutoPlay(true); }}>
          ▶ Play Step-by-Step
        </button>
        {currentStep >= 0 && currentStep < steps.length - 1 && !autoPlay && (
          <button style={styles.playBtn} onClick={() => setCurrentStep(s => s + 1)}>Next Step →</button>
        )}
        {currentStep >= steps.length - 1 && <span style={styles.doneTag}>✨ Done! GCD found!</span>}
      </div>

      <div style={styles.stepsGrid}>
        <div style={styles.stepsCard}>
          <h3 style={styles.cardTitle}>Division Steps</h3>
          {steps.map((s, i) => {
            const visible = currentStep === -1 || i <= currentStep;
            return (
              <div key={i} style={{
                ...styles.stepRow,
                opacity: visible ? 1 : 0.2,
                background: visible && i === currentStep ? "#FFF0E5" : "transparent",
                transform: visible ? "translateX(0)" : "translateX(-10px)",
                transition: "all 0.4s ease",
              }}>
                <span style={{ ...styles.stepDot, background: SQUARE_COLORS[i % 8] }} />
                <span style={styles.stepText}>
                  <b style={{ color: COLORS.primary }}>Step {i + 1}:</b>{" "}
                  {s.a} ÷ {s.b} = <span style={{ color: COLORS.primary, fontWeight: 800, fontSize: 18 }}>{s.q}</span>{" "}
                  remainder <span style={{ color: COLORS.purple, fontWeight: 700 }}>{s.r}</span>
                </span>
              </div>
            );
          })}
        </div>

        <div style={styles.summaryCard}>
          <h3 style={styles.cardTitle}>Results</h3>
          <div style={styles.resultRow}><span style={styles.resultLabel}>Starting pair:</span> <b>{a} and {b}</b></div>
          <div style={styles.resultRow}><span style={styles.resultLabel}>Number of steps:</span> <b style={{ color: COLORS.primary, fontSize: 22 }}>{steps.length}</b></div>
          <div style={styles.resultRow}><span style={styles.resultLabel}>Total squares:</span> <b style={{ color: COLORS.secondary, fontSize: 22 }}>{totalSquares}</b></div>
          <div style={styles.resultRow}><span style={styles.resultLabel}>GCD:</span> <b style={{ color: COLORS.purple, fontSize: 22 }}>{steps[steps.length - 1]?.b || a}</b></div>
          <div style={styles.resultRow}>
            <span style={styles.resultLabel}>Quotients (the recipe):</span>
            <div style={styles.quotientRow}>
              {steps.map((s, i) => (
                <span key={i} style={{ ...styles.quotientBubble, background: SQUARE_COLORS[i % 8] }}>{s.q}</span>
              ))}
            </div>
          </div>
          <div style={styles.resultRow}><span style={styles.resultLabel}>Ratio a/b:</span> <b>{(a / b).toFixed(4)}</b></div>
          {Math.abs(a / b - (1 + Math.sqrt(5)) / 2) < 0.05 && (
            <div style={styles.funFact}>🌀 This ratio is close to the Golden Ratio (φ ≈ 1.6180)!</div>
          )}
          {Math.abs(a / b - Math.sqrt(2)) < 0.05 && (
            <div style={styles.funFact}>📐 This ratio is close to √2 ≈ 1.4142!</div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─────────────── TAB 2: NUMBER MAP ─────────────── */
function TabMap() {
  const categories = [
    {
      title: "Whole Numbers",
      emoji: "🟢",
      color: "#96CEB4",
      example: "6 ÷ 1 = 6 R0",
      desc: "One step, done instantly!",

    },
    {

      color: "#FF6B9D",

      </div>

      <div style={styles.mapContainer}>
        <div style={styles.mapScale}>
          <div style={styles.mapScaleLabel}>Simple</div>
          <div style={{ ...styles.mapScaleBar, background: "linear-gradient(90deg, #96CEB4, #45B7D1, #A06CD5, #FF6B9D)" }} />
          <div style={styles.mapScaleLabel}>Complex</div>
        </div>

        {categories.map((cat, i) => (
          <div key={i} style={{ ...styles.mapCard, borderLeft: `6px solid ${cat.color}`, animationDelay: `${i * 0.1}s` }}>
            <div style={styles.mapCardHeader}>
              <span style={{ fontSize: 28 }}>{cat.emoji}</span>
              <div>

          <h3 style={{ margin: "0 0 8px", color: COLORS.primary }}>💡 The Big Insight</h3>
          <p style={{ margin: 0, lineHeight: 1.6 }}>
            <b>Rational numbers</b> have RSS recipes that <b>end</b>. {" "}
            <b>Irrational numbers</b> have recipes that go <b>forever</b>. {" "}
            Among the forever-recipes, square roots have a <b>repeating pattern</b>, {" "}

  );
}

/* ─────────────── TAB 3: SQRT EXPLORER ─────────────── */
function TabSqrt() {
  const [r, setR] = useState(2);
  const [showGuided, setShowGuided] = useState(true);
  const [guidedStep, setGuidedStep] = useState(0);

  const cf = useMemo(() => sqrtCF(r, 20), [r]);
  const isqrt = Math.floor(Math.sqrt(r));
  const isPerfect = isqrt * isqrt === r;

  const guidedSteps2 = [
    { title: "Start with √2", content: `We know √2 is between 1 and 2 (since 1² = 1 and 2² = 4).\nSo the integer part is 1. Write: √2 = 1 + (√2 − 1)` },
    { title: "Flip the fractional part", content: `Take the leftover (√2 − 1) and flip it:\n1/(√2 − 1)\n\nMultiply top and bottom by (√2 + 1):\n= (√2 + 1) / ((√2)² − 1²)\n= (√2 + 1) / (2 − 1)\n= √2 + 1` },
    { title: "Find integer part again", content: `√2 + 1 ≈ 2.414...\nInteger part = 2. Leftover = √2 + 1 − 2 = √2 − 1\n\n...wait, that's the SAME leftover as Step 1!` },
    { title: "It repeats forever!", content: `Since we got √2 − 1 again, the process loops:\n\n√2 = 1 + 1/(2 + 1/(2 + 1/(2 + ...)))\n\nRSS Recipe: [1; 2, 2, 2, 2, ...]\nThe 2 repeats forever! ♾️` },
  ];

  const guidedSteps17 = [
    { title: "Start with √17", content: `√17 is between 4 and 5 (since 4² = 16 and 5² = 25).\nInteger part = 4. Write: √17 = 4 + (√17 − 4)` },
    { title: "Flip and rationalize", content: `1/(√17 − 4) × (√17 + 4)/(√17 + 4)\n= (√17 + 4)/(17 − 16)\n= √17 + 4\n\nSo: √17 = 4 + 1/(√17 + 4)` },
    { title: "Self-substitution!", content: `Since √17 appears on both sides:\n√17 = 4 + 1/(4 + √17)\n     = 4 + 1/(4 + 4 + 1/(4 + √17))\n     = 4 + 1/(8 + 1/(4 + √17))` },
    { title: "The repeating pattern", content: `Keep going and the pattern emerges:\n\n√17 = [4; 8, 8, 8, 8, ...]\n     = [4; (8)]\n\nThe 8 repeats forever!\nNotice: 8 = 2 × 4 = 2 × a₀. This always happens!` },
  ];

  const guidedSteps = r === 2 ? guidedSteps2 : r === 17 ? guidedSteps17 : null;

  const sqrtPresets = [2, 3, 5, 7, 10, 13, 17, 19];

  return (
    <div>
      <div style={styles.sectionIntro}>
        <h2 style={styles.sectionTitle}>🔍 The √ Explorer</h2>
        <p style={styles.sectionDesc}>
          Discover how to find the RSS recipe (continued fraction) for any square root!
          The trick: <b>rationalize the denominator</b> — multiply by the conjugate.
        </p>
      </div>

      <div style={styles.sqrtControls}>
        <span style={styles.inputLabel}>Pick a number:</span>
        <div style={styles.presetRow}>
          {sqrtPresets.map(n => (
            <button key={n} onClick={() => { setR(n); setGuidedStep(0); }}
              style={{ ...styles.presetBtn, ...(r === n ? styles.presetActive : {}) }}>
              √{n}
            </button>
          ))}
        </div>
      </div>

      {isPerfect ? (
        <div style={styles.perfectSquareMsg}>
          ✅ {r} is a perfect square! √{r} = {isqrt}. No continued fraction needed — it's already a whole number!
        </div>
      ) : (
        <>
          <div style={styles.modeToggle}>
            {(r === 2 || r === 17) && (
              <button style={{ ...styles.modeBtn, ...(showGuided ? styles.modeBtnActive : {}) }}
                onClick={() => setShowGuided(true)}>
                📖 Guided Walkthrough
              </button>
            )}
            <button style={{ ...styles.modeBtn, ...(!showGuided ? styles.modeBtnActive : {}) }}
              onClick={() => setShowGuided(false)}>
              🔬 Free Exploration
            </button>
          </div>

          {showGuided && guidedSteps ? (
            <div style={styles.guidedContainer}>
              <div style={styles.guidedProgress}>
                {guidedSteps.map((_, i) => (
                  <div key={i} style={{
                    ...styles.guidedDot,
                    background: i <= guidedStep ? COLORS.primary : COLORS.border,
                    transform: i === guidedStep ? "scale(1.3)" : "scale(1)",
                  }} />
                ))}
              </div>
              <div style={styles.guidedCard}>
                <h3 style={{ color: COLORS.primary, margin: "0 0 12px" }}>
                  Step {guidedStep + 1}: {guidedSteps[guidedStep].title}
                </h3>
                <pre style={styles.guidedContent}>{guidedSteps[guidedStep].content}</pre>
              </div>
              <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                <button style={styles.playBtn} disabled={guidedStep === 0}
                  onClick={() => setGuidedStep(s => s - 1)}>← Back</button>
                <button style={styles.playBtn} disabled={guidedStep === guidedSteps.length - 1}
                  onClick={() => setGuidedStep(s => s + 1)}>Next →</button>
              </div>
            </div>
          ) : (
            <div style={styles.explorerGrid}>
              <div style={styles.explorerCard}>
                <h3 style={styles.cardTitle}>Algorithm Steps</h3>
                <div style={styles.algoHeader}>
                  √{r} ≈ {Math.sqrt(r).toFixed(6)} → a₀ = {cf.a0}
                </div>
                <div style={styles.algoHeader}>
                  State at each step: (√{r} + m) / d
                </div>
                <table style={styles.algoTable}>
                  <thead>
                    <tr>
                      <th style={styles.th}>Step</th>
                      <th style={styles.th}>State</th>
                      <th style={styles.th}>aₙ</th>
                      <th style={styles.th}>m→</th>
                      <th style={styles.th}>d→</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr style={styles.algoRow}>
                      <td style={styles.td}>0</td>
                      <td style={styles.td}>√{r}</td>
                      <td style={{ ...styles.td, color: COLORS.primary, fontWeight: 800 }}>{cf.a0}</td>
                      <td style={styles.td}>{cf.a0}</td>
                      <td style={styles.td}>{r - cf.a0 * cf.a0}</td>
                    </tr>
                    {cf.states?.map((s, i) => (
                      <tr key={i} style={{
                        ...styles.algoRow,
                        background: i === cf.states.length - 1 ? "#FFF0E5" : "transparent"
                      }}>
                        <td style={styles.td}>{i + 1}</td>
                        <td style={styles.td}>(√{r}+{s.m})/{s.d}</td>
                        <td style={{ ...styles.td, color: COLORS.primary, fontWeight: 800 }}>{s.an}</td>
                        <td style={styles.td}>{s.mNext}</td>
                        <td style={styles.td}>{s.dNext}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div style={styles.explorerCard}>
                <h3 style={styles.cardTitle}>Results</h3>
                <div style={styles.cfResult}>
                  <div style={styles.cfLabel}>RSS Recipe:</div>
                  <code style={styles.cfCode}>
                    [{cf.a0}; ({cf.period.join(", ")})]
                  </code>
                </div>
                <div style={styles.cfResult}>
                  <div style={styles.cfLabel}>Period length:</div>
                  <b style={{ color: COLORS.purple, fontSize: 20 }}>{cf.period.length}</b>
                </div>
                <div style={styles.cfResult}>
                  <div style={styles.cfLabel}>Last term = 2 × a₀?</div>
                  <b style={{ color: COLORS.secondary }}>
                    {cf.period[cf.period.length - 1]} = 2 × {cf.a0} ✓ (always true!)
                  </b>
                </div>
                <div style={styles.cfResult}>
                  <div style={styles.cfLabel}>Palindrome check:</div>
                  {(() => {
                    const inner = cf.period.slice(0, -1);
                    const rev = [...inner].reverse();
                    const isPalin = inner.every((v, i) => v === rev[i]);
                    return <b style={{ color: COLORS.secondary }}>
                      [{inner.join(",")}] → {isPalin ? "Yes! ✨" : "Checking..."}
                    </b>;
                  })()}
                </div>
                <h3 style={{ ...styles.cardTitle, marginTop: 20 }}>Best Rational Approximations</h3>
                <div style={{ fontSize: 13, lineHeight: 2 }}>
                  {cf.convergents.slice(0, 8).map((c, i) => (
                    <div key={i} style={styles.convergentRow}>
                      <span style={styles.convergentFrac}>{c.p}/{c.q}</span>
                      <span style={{ color: COLORS.textLight }}>= {(c.p / c.q).toFixed(6)}</span>
                      <span style={{ color: COLORS.purple, fontSize: 11 }}>
                        (error: {Math.abs(c.p / c.q - Math.sqrt(r)).toExponential(1)})
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ─────────────── TAB 4: RECTANGLE ART ─────────────── */
function RectViz({ a, b, label, compact = false }) {
  const steps = useMemo(() => euclideanSteps(a, b), [a, b]);
  const squares = useMemo(() => buildSquares(a, b, steps), [a, b, steps]);
  const [hoveredGroup, setHoveredGroup] = useState(null);
  const [animStep, setAnimStep] = useState(-1);
  const [animating, setAnimating] = useState(false);

  useEffect(() => {
    if (animating && animStep < squares.length - 1) {
      const timer = setTimeout(() => setAnimStep(s => s + 1), 400);
      return () => clearTimeout(timer);
    }
    if (animStep >= squares.length - 1) setAnimating(false);
  }, [animating, animStep, squares.length]);

  const padding = compact ? 20 : 32;
  const maxW = compact ? 260 : 480;
  const maxH = compact ? 180 : 340;
  const scale = Math.min(maxW / a, maxH / b);
  const svgW = a * scale + padding * 2;
  const svgH = b * scale + padding * 2;

  return (
    <div style={{ textAlign: "center" }}>
      {label && <div style={styles.vizLabel}>{label}</div>}
      {!compact && (
        <div style={{ marginBottom: 8, display: "flex", gap: 8, justifyContent: "center" }}>
          <button style={styles.smallBtn} onClick={() => { setAnimStep(-1); setAnimating(false); }}>Show All</button>
          <button style={styles.smallBtn} onClick={() => { setAnimStep(0); setAnimating(true); }}>▶ Animate</button>
        </div>
      )}
      <svg width={svgW} height={svgH} viewBox={`0 0 ${svgW} ${svgH}`}>
        <rect x={padding - 1} y={padding - 1} width={a * scale + 2} height={b * scale + 2}
          fill="none" stroke={COLORS.border} strokeWidth={2} rx={3} />
        {squares.map((sq, i) => {
          const sx = sq.x * scale + padding, sy = sq.y * scale + padding, ss = sq.size * scale;
          const isHovered = hoveredGroup === sq.group;
          const visible = animStep === -1 || i <= animStep;
          const opacity = !visible ? 0 : hoveredGroup === null ? 0.8 : isHovered ? 1 : 0.3;
          return (
            <g key={i} onMouseEnter={() => setHoveredGroup(sq.group)} onMouseLeave={() => setHoveredGroup(null)}
              style={{ cursor: "pointer" }}>
              <rect x={sx} y={sy} width={ss} height={ss}
                fill={SQUARE_COLORS[sq.colorIdx]} fillOpacity={opacity}
                stroke={isHovered ? COLORS.text : "#fff"} strokeWidth={isHovered ? 2.5 : 1}
                rx={2}
                style={{ transition: "all 0.3s ease" }} />
              {ss > (compact ? 22 : 28) && visible && (
                <text x={sx + ss / 2} y={sy + ss / 2} textAnchor="middle" dominantBaseline="central"
                  fill={COLORS.text} fontSize={Math.min(compact ? 11 : 14, ss * 0.3)}
                  fontFamily="inherit" fontWeight={700} style={{ opacity: isHovered ? 1 : 0.7 }}>
                  {sq.size}
                </text>
              )}
            </g>
          );
        })}
        {/* Spiral arcs */}
        {(() => {
          const arcs = [];
          let x = 0, y = 0, horizontal = true, w = a, h = b;
          for (const step of steps) {
            for (let i = 0; i < step.q; i++) {
              const side = horizontal ? h : w;
              const sx = x * scale + padding, sy = y * scale + padding, ss = side * scale;
              const orient = arcs.length % 4;
              let s1, s2;
              if (orient === 0) { s1 = { x: sx + ss, y: sy }; s2 = { x: sx, y: sy + ss }; }
              else if (orient === 1) { s1 = { x: sx + ss, y: sy + ss }; s2 = { x: sx, y: sy }; }
              else if (orient === 2) { s1 = { x: sx, y: sy + ss }; s2 = { x: sx + ss, y: sy }; }
              else { s1 = { x: sx, y: sy }; s2 = { x: sx + ss, y: sy + ss }; }
              const visible2 = animStep === -1 || arcs.length <= animStep;
              arcs.push(<path key={arcs.length}
                d={`M ${s1.x} ${s1.y} A ${ss} ${ss} 0 0 1 ${s2.x} ${s2.y}`}
                fill="none" stroke={COLORS.primary} strokeWidth={Math.max(1, ss * 0.015)}
                strokeLinecap="round" opacity={visible2 ? 0.5 : 0} style={{ transition: "opacity 0.3s" }} />);
              if (horizontal) x += side; else y += side;
            }
            if (horizontal) w -= step.q * h; else h -= step.q * w;
            horizontal = !horizontal;
          }
          return arcs;
        })()}
        <text x={padding + a * scale / 2} y={padding - 8} textAnchor="middle"
          fill={COLORS.textLight} fontSize={compact ? 10 : 12} fontFamily="inherit" fontWeight={600}>{a}</text>
        <text x={padding - 10} y={padding + b * scale / 2} textAnchor="middle"
          fill={COLORS.textLight} fontSize={compact ? 10 : 12} fontFamily="inherit" fontWeight={600}
          transform={`rotate(-90,${padding - 10},${padding + b * scale / 2})`}>{b}</text>
      </svg>
      <div style={{ fontSize: 11, color: COLORS.textLight, marginTop: 4 }}>
        [{steps.map(s => s.q).join(", ")}] — {steps.length} steps, {steps.reduce((s, st) => s + st.q, 0)} squares
      </div>
    </div>
  );
}

function TabArt() {
  const [mode, setMode] = useState("single");
  const [a, setA] = useState(55);
  const [b, setB] = useState(34);
  const [inputA, setInputA] = useState("55");
  const [inputB, setInputB] = useState("34");
  const [sqrtN, setSqrtN] = useState(2);
  const [approxLevel, setApproxLevel] = useState(3);

  const apply = useCallback(() => {
    const na = parseInt(inputA), nb = parseInt(inputB);
    if (na > 1 && nb > 0 && na > nb && na <= 500) { setA(na); setB(nb); }
  }, [inputA, inputB]);

  const sqrtApprox = useMemo(() => {
    const cf = sqrtCF(sqrtN, 10);
    return cf.convergents.slice(1, 7);
  }, [sqrtN]);

  const comparePairs = [
    { a: 55, b: 34, label: "55/34 (Fibonacci)" },
    { a: 17, b: 12, label: "17/12 (≈ √2)" },
    { a: 97, b: 60, label: "97/60" },
    { a: 30, b: 11, label: "30/11" },
  ];

  return (
    <div>
      <div style={styles.sectionIntro}>
        <h2 style={styles.sectionTitle}>🎨 Rectangle Art</h2>
        <p style={styles.sectionDesc}>
          Every RSS calculation is also a picture! We pack squares into a rectangle — {" "}
          the quotients tell us how many squares fit at each step. Watch for the <b>spiral</b>!
        </p>
      </div>

      <div style={styles.modeToggle}>
        <button style={{ ...styles.modeBtn, ...(mode === "single" ? styles.modeBtnActive : {}) }}
          onClick={() => setMode("single")}>🖼️ Single</button>
        <button style={{ ...styles.modeBtn, ...(mode === "compare" ? styles.modeBtnActive : {}) }}
          onClick={() => setMode("compare")}>📊 Side-by-Side</button>
        <button style={{ ...styles.modeBtn, ...(mode === "sqrt" ? styles.modeBtnActive : {}) }}
          onClick={() => setMode("sqrt")}>📐 √ Approximations</button>
      </div>

      {mode === "single" && (
        <div>
          <div style={styles.controlRow}>
            <div style={styles.presetRow}>
              {[{ a: 55, b: 34 }, { a: 89, b: 55 }, { a: 144, b: 89 }, { a: 17, b: 12 }, { a: 30, b: 11 }].map(p => (
                <button key={`${p.a}-${p.b}`}
                  onClick={() => { setA(p.a); setB(p.b); setInputA(String(p.a)); setInputB(String(p.b)); }}
                  style={{ ...styles.presetBtn, ...(a === p.a && b === p.b ? styles.presetActive : {}) }}>
                  {p.a}×{p.b}
                </button>
              ))}
            </div>
            <div style={styles.inputGroup}>
              <input style={styles.numInput} value={inputA} onChange={e => setInputA(e.target.value)}
                onKeyDown={e => e.key === "Enter" && apply()} />
              <span style={{ fontWeight: 700, color: COLORS.textLight }}>×</span>
              <input style={styles.numInput} value={inputB} onChange={e => setInputB(e.target.value)}
                onKeyDown={e => e.key === "Enter" && apply()} />
              <button style={styles.goBtn} onClick={apply}>Go!</button>
            </div>
          </div>
          <div style={styles.vizCenter}>
            <RectViz a={a} b={b} />
          </div>
        </div>
      )}

      {mode === "compare" && (
        <div style={styles.compareGrid}>
          {comparePairs.map((p, i) => (
            <div key={i} style={styles.compareCard}>
              <RectViz a={p.a} b={p.b} label={p.label} compact />
            </div>
          ))}
        </div>
      )}

      {mode === "sqrt" && (
        <div>
          <div style={{ ...styles.controlRow, justifyContent: "center" }}>
            <span style={styles.inputLabel}>Approximations of:</span>
            {[2, 3, 5, 7].map(n => (
              <button key={n} onClick={() => setSqrtN(n)}
                style={{ ...styles.presetBtn, ...(sqrtN === n ? styles.presetActive : {}) }}>
                √{n}
              </button>
            ))}
          </div>
          <p style={{ textAlign: "center", color: COLORS.textLight, fontSize: 13, margin: "8px 0 16px" }}>
            As the approximation gets better (more terms in the recipe), the rectangle looks more and more like a true √{sqrtN} rectangle!
          </p>
          <div style={styles.sqrtApproxGrid}>
            {sqrtApprox.map((c, i) => (
              <div key={i} style={styles.compareCard}>
                <RectViz a={c.p} b={c.q}
                  label={`${c.p}/${c.q} ≈ ${(c.p / c.q).toFixed(4)}`}
                  compact />
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}
